name: Docker Pricing Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: docker.io
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME is empty"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN is empty"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for API image
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/pricing-epac-api
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push pricing API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract metadata for MLflow image
        id: meta_mlflow
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/pricing-epac-mlflow
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push MLflow image
        id: build_mlflow
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mlflow
          push: true
          tags: ${{ steps.meta_mlflow.outputs.tags }}
          labels: ${{ steps.meta_mlflow.outputs.labels }}

      - name: Extract metadata for Prefect image
        id: meta_prefect
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/pricing-epac-prefect
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Prefect image
        id: build_prefect
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prefect
          push: true
          tags: ${{ steps.meta_prefect.outputs.tags }}
          labels: ${{ steps.meta_prefect.outputs.labels }}

      - name: Print published digests
        run: |
          echo "API digest: ${{ steps.build_api.outputs.digest }}"
          echo "MLflow digest: ${{ steps.build_mlflow.outputs.digest }}"
          echo "Prefect digest: ${{ steps.build_prefect.outputs.digest }}"
