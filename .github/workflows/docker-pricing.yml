name: Docker Pricing Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push pricing API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pricing-epac-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pricing-epac-api:${{ github.sha }}

      - name: Build and push MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mlflow
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pricing-epac-mlflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pricing-epac-mlflow:${{ github.sha }}
