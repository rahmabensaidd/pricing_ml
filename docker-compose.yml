networks:
  epac_network:
    driver: bridge

volumes:
  mysql_data:
  postgres_mlflow_data:
  minio_data:
  prefect_data:

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-epac
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-temp_epac}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - epac_network

  postgres-mlflow:
    image: postgres:13
    container_name: postgres-mlflow
    environment:
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow_user}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:?Set MLFLOW_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflow_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_POSTGRES_USER:-mlflow_user} -d ${MLFLOW_POSTGRES_DB:-mlflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - epac_network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio-mlflow
    environment:
      MINIO_ROOT_USER: ${MLFLOW_S3_ACCESS_KEY:?Set MLFLOW_S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MLFLOW_S3_SECRET_KEY:?Set MLFLOW_S3_SECRET_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - epac_network
    restart: unless-stopped

  create-bucket:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      sleep 10;
      until /usr/bin/mc alias set myminio http://minio:9000 ${MLFLOW_S3_ACCESS_KEY:?Set MLFLOW_S3_ACCESS_KEY in .env} ${MLFLOW_S3_SECRET_KEY:?Set MLFLOW_S3_SECRET_KEY in .env}; do
        echo 'Retrying MinIO connection...';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/${MLFLOW_BUCKET_NAME:-mlflow-artifacts} --ignore-existing;
      echo 'Bucket ready';
      exit 0;
      "
    networks:
      - epac_network

  mlflow-server:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
      args:
        MLFLOW_VERSION: ${MLFLOW_VERSION:-3.10.0}
    image: ${DOCKERHUB_USERNAME:-local}/pricing-epac-mlflow:latest
    container_name: mlflow-server
    depends_on:
      postgres-mlflow:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MLFLOW_S3_ACCESS_KEY:?Set MLFLOW_S3_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${MLFLOW_S3_SECRET_KEY:?Set MLFLOW_S3_SECRET_KEY in .env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    command: >
      mlflow server
      --backend-store-uri postgresql://${MLFLOW_POSTGRES_USER:-mlflow_user}:${MLFLOW_POSTGRES_PASSWORD:?Set MLFLOW_POSTGRES_PASSWORD in .env}@postgres-mlflow:5432/${MLFLOW_POSTGRES_DB:-mlflow_db}
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME:-mlflow-artifacts}
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow-server,mlflow-server:5000,host.docker.internal,host.docker.internal:5000
      --serve-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - epac_network
    restart: unless-stopped

  pricing-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ${DOCKERHUB_USERNAME:-local}/pricing-epac-api:latest
    container_name: pricing-epac-api
    depends_on:
      mlflow-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      MLFLOW_TRACKING_URI: ${API_MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MLFLOW_S3_ACCESS_KEY:?Set MLFLOW_S3_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${MLFLOW_S3_SECRET_KEY:?Set MLFLOW_S3_SECRET_KEY in .env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME:-mlflow-artifacts}
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-temp_epac}
    networks:
      - epac_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 15

  pricing-watcher:
    profiles:
      - watcher
    image: ${DOCKERHUB_USERNAME:-local}/pricing-epac-api:latest
    container_name: pricing-watcher
    depends_on:
      mysql:
        condition: service_healthy
      mlflow-server:
        condition: service_healthy
      prefect-server:
        condition: service_started
    command: >
      python -m pricing__epac.src.machine_learning.ingestion.watcher
      --mode ${WATCHER_MODE:-all}
    environment:
      MLFLOW_TRACKING_URI: ${WATCHER_MLFLOW_TRACKING_URI:-http://mlflow-server:5000}
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-temp_epac}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MLFLOW_S3_ACCESS_KEY:?Set MLFLOW_S3_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${MLFLOW_S3_SECRET_KEY:?Set MLFLOW_S3_SECRET_KEY in .env}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME:-mlflow-artifacts}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./pricing__epac/data:/app/pricing__epac/data
      - ./pricing__epac/runtime:/app/pricing__epac/runtime
      - ./pricing__epac/artifacts:/app/pricing__epac/artifacts
      - ./.env:/app/.env:ro
    networks:
      - epac_network
    restart: unless-stopped

  pricing-copilot:
    build:
      context: .
      dockerfile: Dockerfile.copilot
    image: ${DOCKERHUB_USERNAME:-local}/pricing-epac-copilot:latest
    container_name: pricing-copilot
    depends_on:
      pricing-api:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      PRICING_API_BASE_URL: ${PRICING_API_BASE_URL:-http://pricing-api:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    networks:
      - epac_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 5s
      retries: 15
  prefect-server:
    image: prefecthq/prefect:3-python3.11
    container_name: prefect-server
    ports:
      - "4200:4200"
    command: >
      prefect server start
      --host 0.0.0.0
      --port 4200
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL:-http://localhost:4200/api}
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - epac_network
    restart: unless-stopped

